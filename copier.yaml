_envops:
  trim_blocks: true
  lstrip_blocks: true

_subdirectory: python-ai-kit

project_type:
  type: str
  help: What type of project are you creating?
  choices:
    - "api-monolith"
    - "api-microservice"
    - "mcp-server"
    - "agent"

plugins:
  type: str
  help: Which plugins would you like to enable?
  multiselect: true
  default: |
    {% if project_type in ["api-monolith", "api-microservice", "agent"] %}
    - "sqladmin"
    - "celery"
    - "sentry"
    {% else %}
    []
    {% endif %}
  choices: |
    {% if project_type in ["api-monolith", "api-microservice", "agent"] %}
    SQLAdmin [interface for database management]: sqladmin
    Celery [task queue]: celery
    Sentry [error tracking]: sentry
    {% else %}
    {}
    {% endif %}
  when: "{{ project_type in ['api-monolith', 'api-microservice', 'agent'] }}"

project_name:
  type: str
  help: What is your project name?
  validator: |
    {% if project_name | length < 1 %}
    project_name must cannot be empty string
    {% endif %}
    {% if not (project_name | regex_search('^[a-zA-Z][a-z0-9\-]+$')) %}
    project_name must start with a letter, followed one or more letters, digits or dashes (all lowercase).
    {% endif %}

project_description:
  type: str
  help: What is your project description (it will be used in pyproject.toml)?
  default: ""

python_versions:
  type: str
  help: What Python versions will be supported?
  default:
    - "3.13"
  multiselect: true
  choices:
    - "3.12"
    - "3.13"
    - "3.14"
  validator: |
    {% set all_ver = ["3.12", "3.13", "3.14"] %}
    {% if all_ver.index(python_versions[-1]) - all_ver.index(python_versions[0]) + 1 != python_versions|length %}
    python_versions must be a consecutive list of versions
    {% endif %}

default_python_version:
  type: str
  help: What is the default Python version?
  default: "{{python_versions[-1]}}"
  choices: |
    {% for ver in python_versions %}
    - "{{ver}}"
    {% endfor %}

add_dvc:
  type: bool
  help: Add DVC (Data Version Control) to the project?
  default: false

dvc_remote_name:
  type: str
  help: Name for the DVC remote
  default: "storage"
  when: "{{ add_dvc }}"

dvc_remote_url:
  type: str
  help: Full S3 path for DVC remote (e.g. s3://bucket-name/path)
  when: "{{ add_dvc }}"

dvc_region:
  type: str
  help: AWS region for DVC remote
  when: "{{ add_dvc }}"

_exclude:
  - "{{ 'migrations' if project_type not in ['api-monolith', 'api-microservice', 'agent'] else '' }}"
  - "{{ 'app/database.py' if project_type not in ['api-monolith', 'api-microservice', 'agent'] else '' }}"
  - "{{ 'app/mappings.py' if project_type not in ['api-monolith', 'api-microservice', 'agent'] else '' }}"
  - "{{ 'app/utils/mappings_meta.py' if project_type not in ['api-monolith', 'api-microservice', 'agent'] else '' }}"

  - "{{ 'README_api.md' if project_type not in ['api-monolith', 'api-microservice'] else '' }}"
  - "{{ 'Dockerfile' if project_type not in ['api-monolith', 'api-microservice'] else '' }}"
  - "{{ 'docker-compose.yml' if project_type not in ['api-monolith', 'api-microservice'] else '' }}"

  - "{{ 'app/api.py' if project_type != 'api-monolith' else '' }}"
  - "{{ 'app/user' if project_type != 'api-monolith' else '' }}"
  - "{{ 'app/repositories.py' if project_type != 'api-monolith' else '' }}"
  - "{{ 'app/services.py' if project_type != 'api-monolith' else '' }}"

  - "{{ 'app/schemas/user.py' if project_type != 'api-microservice' else '' }}"
  - "{{ 'app/services' if project_type != 'api-microservice' else '' }}"
  - "{{ 'app/repositories' if project_type != 'api-microservice' else '' }}"
  - "{{ 'app/api/routes/v1/user.py' if project_type != 'api-microservice' else '' }}"

  - "{{ 'app/api' if project_type not in ['api-microservice', 'agent'] else '' }}"
  - "{{ 'app/models' if project_type not in ['api-microservice', 'agent'] else '' }}"
  - "{{ 'app/schemas' if project_type not in ['api-microservice', 'agent'] else '' }}"

  - "{{ 'examples' if project_type != 'agent' else '' }}"
  - "{{ 'README_agent.md' if project_type != 'agent' else '' }}"
  - "{{ 'app/agent' if project_type != 'agent' else '' }}"
  - "{{ 'app/gui.py' if project_type != 'agent' else '' }}"
  - "{{ 'app/utils/date_handlers.py' if project_type != 'agent' else '' }}"
  - "{{ 'app/utils/llm_vendor.py' if project_type != 'agent' else '' }}"

  - "{{ 'README_mcp-server.md' if project_type != 'mcp-server' else '' }}"
  - "{{ 'app/mcp' if project_type != 'mcp-server' else '' }}"

  - "{{ 'app/integrations/sqladmin' if 'sqladmin' not in plugins else '' }}"
  - "{{ 'app/integrations/celery' if 'celery' not in plugins else '' }}"
  - "{{ 'app/integrations/sentry.py' if 'sentry' not in plugins else '' }}"
  - "{{ 'README_DVC.md.jinja' if not add_dvc else '' }}"

_tasks:
  - command: |
      uvx python -c "
      import subprocess, sys
      msg = 'DVC is not installed or not in PATH. Install it with: uv tool install dvc'
      try:
          subprocess.run(['dvc', '--version'], capture_output=True, timeout=10, check=True)
      except (subprocess.CalledProcessError, FileNotFoundError):
          sys.stderr.write(msg + chr(10))
          sys.exit(1)
      "
    when: "{{ add_dvc }}"
  - command: uvx python -c "import shutil; shutil.move('README_{{project_type}}.md', 'README.md')"
    when: "{{ project_type in ['agent', 'mcp-server'] }}"
  - command: uvx python -c "import shutil; shutil.move('README_api.md', 'README.md')"
    when: "{{ project_type in ['api-monolith', 'api-microservice'] }}"
  - command: uvx python -c "import os; os.makedirs('migrations/versions', exist_ok=True)"
    when: "{{ project_type in ['api-monolith', 'api-microservice', 'agent'] }}"
  - "uv sync --group code-quality"
  - "git init && git checkout -b master"
  - command: dvc init
    when: "{{ add_dvc }}"
  - command: dvc remote add -d {{ dvc_remote_name }} {{ dvc_remote_url }}
    when: "{{ add_dvc }}"
  - command: dvc remote modify {{ dvc_remote_name }} region {{ dvc_region }}
    when: "{{ add_dvc }}"
  - "git add --all"
  - command: uvx python -c "import subprocess; result = subprocess.run(['uv', 'run', 'pre-commit', 'run', '--all-files']); exit(0)"
  - "git add --all"
  - command: uvx python -c "import subprocess; subprocess.run(['git', 'commit', '-m', 'Initial commit'])"
